name: CI & E2E Pipeline

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Dockerfile.e2e'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/ci.yml'
  push:
    branches: [develop, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Dockerfile.e2e'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # STAGE: lint
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  # ============================================
  # STAGE: type-check
  # ============================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @codecomply/db generate

      - name: Type check
        run: pnpm typecheck

  # ============================================
  # STAGE: unit-tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @codecomply/db generate

      - name: Run unit tests
        run: pnpm test:unit

      - name: Upload unit test coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ============================================
  # STAGE: integration-tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inspector
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: inspections_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @codecomply/db generate

      - name: Run database migrations
        run: pnpm --filter @codecomply/db migrate:deploy
        env:
          DATABASE_URL: postgresql://inspector:test_password@localhost:5432/inspections_test

      - name: Seed test database
        run: pnpm --filter @codecomply/db seed
        env:
          DATABASE_URL: postgresql://inspector:test_password@localhost:5432/inspections_test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://inspector:test_password@localhost:5432/inspections_test

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: integration
          fail_ci_if_error: false

  # ============================================
  # STAGE: build
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @codecomply/db generate

      - name: Build all packages
        run: pnpm build

      - name: Verify inspector production bundle hygiene
        run: pnpm --filter @codecomply/inspector test:unit -- __tests__/no-dev-chunks-in-prod.spec.ts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist
          retention-days: 7

  # ============================================
  # STAGE: e2e-tests (every PR + main merge)
  # ============================================
  e2e-tests:
    name: E2E Tests (All-in-One Container)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build E2E container
        run: docker build -f Dockerfile.e2e -t inspections-e2e .

      - name: Run E2E tests in container
        id: e2e-tests
        run: |
          docker run --rm \
            -v $(pwd)/test-results:/test-results \
            inspections-e2e
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check test results exist
        if: always()
        run: |
          if [ -d "test-results" ] && [ "$(ls -A test-results)" ]; then
            echo "Test results found"
            ls -la test-results/
          else
            echo "No test results found"
          fi

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

      - name: Parse and display test summary
        if: always()
        run: |
          if [ -f "test-results/cucumber-report.json" ]; then
            echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
            if command -v jq &> /dev/null; then
              TOTAL=$(jq '[.[] | .elements[] | .steps[]] | length' test-results/cucumber-report.json 2>/dev/null || echo "0")
              PASSED=$(jq '[.[] | .elements[] | .steps[] | select(.result.status == "passed")] | length' test-results/cucumber-report.json 2>/dev/null || echo "0")
              FAILED=$(jq '[.[] | .elements[] | .steps[] | select(.result.status == "failed")] | length' test-results/cucumber-report.json 2>/dev/null || echo "0")
              echo "- **Total Steps:** $TOTAL" >> $GITHUB_STEP_SUMMARY
              echo "- **Passed:** $PASSED" >> $GITHUB_STEP_SUMMARY
              echo "- **Failed:** $FAILED" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('test-results/cucumber-report.json')) return;
            const results = JSON.parse(fs.readFileSync('test-results/cucumber-report.json', 'utf8'));
            let total = 0, passed = 0, failed = 0;
            results.forEach(f => f.elements.forEach(s => s.steps.forEach(step => {
              total++;
              if (step.result.status === 'passed') passed++;
              if (step.result.status === 'failed') failed++;
            })));
            const body = `## E2E Test Results\n- **Total Steps:** ${total}\n- **Passed:** ${passed}\n- **Failed:** ${failed}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail job if tests failed
        if: steps.e2e-tests.outputs.exit_code != '0'
        run: exit 1

  # ============================================
  # STAGE: deploy-staging (develop merge)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy API to Staging
        run: curl -fsS -X POST "${{ secrets.RENDER_API_STAGING_HOOK }}"

      - name: Deploy Inspector to Staging
        run: curl -fsS -X POST "${{ secrets.RENDER_INSPECTOR_STAGING_HOOK }}"

      - name: Deploy Admin to Staging
        run: curl -fsS -X POST "${{ secrets.RENDER_ADMIN_STAGING_HOOK }}"

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- API, Inspector, Admin deploy hooks invoked" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE: deploy-production (main merge + manual approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy API to Production
        run: curl -fsS -X POST "${{ secrets.RENDER_API_PRODUCTION_HOOK }}"

      - name: Deploy Inspector to Production
        run: curl -fsS -X POST "${{ secrets.RENDER_INSPECTOR_PRODUCTION_HOOK }}"

      - name: Deploy Admin to Production
        run: curl -fsS -X POST "${{ secrets.RENDER_ADMIN_PRODUCTION_HOOK }}"

      - name: Deployment Summary
        run: |
          echo "## Production Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "Manual approval gate passed via GitHub \`production\` environment." >> $GITHUB_STEP_SUMMARY
          echo "Monitor Render dashboard and health endpoints after deploy." >> $GITHUB_STEP_SUMMARY
