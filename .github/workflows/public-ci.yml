name: CI

# Public mirror CI. This file is staged here (NOT under .github/workflows/) so it
# does not run in the private repo. During the Copybara sync it is moved to
# .github/workflows/public-ci.yml in the public `code-comply` repo, where it runs
# and powers the README CI badge. It intentionally contains no deploy jobs or secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @codecomply/db generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Build all packages
        run: pnpm build
