                  format: binary
                clientId:
                  type: string
                  example: client-abc-123
                inspectionId:
                  type: string
                  example: insp-456
                deficiencyId:
                  type: string
                  example: def-789
                checklistItemId:
                  type: string
                metadata:
                  type: string
                  example: '{"caption":"North wall"}'
                annotations:
                  type: string
