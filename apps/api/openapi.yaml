            type: string
            minLength: 1
          required: true
          name: id
          in: path
        - schema:
            type: string
            minLength: 64
            maxLength: 64
          required: true
          name: hash
          in: query
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
