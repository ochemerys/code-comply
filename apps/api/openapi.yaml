                  clientId:
                    type: string
                  inspectionId:
                    type: string
                  deficiencyId:
                    type: string
                    nullable: true
                  filename:
                    type: string
                  mimeType:
                    type: string
                  size:
                    type: integer
                    minimum: 0
                  storageKey:
                    type: string
                    nullable: true
                  metadata:
                    type: object
                    additionalProperties:
                      nullable: true
