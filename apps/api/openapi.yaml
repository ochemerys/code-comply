openapi: 3.0.0
info:
  version: 1.0.0
  title: CodeComply Connect API
  description: API for managing safety codes inspections, deficiencies, and compliance documentation
servers:
  - url: http://localhost:4000
    description: Local development server
tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Sync
    description: Data synchronization endpoints for offline-first functionality
  - name: Permits
    description: Permit management and GPS-based discovery
  - name: Inspections
    description: Inspection management and execution
  - name: Checklists
    description: Checklist templates and field execution
  - name: Codes
    description: Safety code library search and lookup
  - name: Deficiencies
    description: Deficiency CRUD and Stop Work orders
  - name: Documents
    description: Inspection evidence file upload, signed URLs, and deletion
  - name: Reports
    description: PDF report generation, R2 storage, and signed download URLs (M10)
  - name: VoC
    description: Verification of Compliance submission, admin review, and pending queue (M10)
  - name: Photos
    description: Inspection evidence photos — multipart upload, object storage, and deletion (M7-S19)
  - name: Admin
    description: Admin portal — user registry, certifications, and inspection assignments (M9)
  - name: Notifications
    description: Web Push subscriptions and test dispatch (NFR-M-04)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token obtained from POST /auth/login. Send as `Authorization: Bearer <token>`."
  schemas: {}
  parameters: {}
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check the health status of the API and database connection
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                required:
                  - status
                  - timestamp
                  - database
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                required:
                  - status
                  - timestamp
                  - database
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user with email and password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - password
            example:
              email: inspector@example.com
              password: password123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: number
                required:
                  - accessToken
                  - refreshToken
                  - expiresIn
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
                expiresIn: 3600
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Refresh access token using refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: number
                required:
                  - accessToken
                  - refreshToken
                  - expiresIn
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Logout user and invalidate session
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "500":
          description: Logout failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      description: Get the profile of the currently authenticated user
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                    format: email
                  name:
                    type: string
                    minLength: 1
                  role:
                    type: string
                    enum:
                      - SCO
                      - ADMIN
                      - OWNER
                  designationId:
                    type: string
                  disciplines:
                    type: array
                    items:
                      type: string
                  certifications:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        discipline:
                          type: string
                        authority:
                          type: string
                        issuedDate:
                          type: string
                          format: date-time
                        expiryDate:
                          type: string
                          format: date-time
                        status:
                          type: string
                          enum:
                            - ACTIVE
                            - EXPIRED
                            - REVOKED
                      required:
                        - id
                        - discipline
                        - authority
                        - issuedDate
                        - status
                  lastLoginAt:
                    type: string
                    format: date-time
                  certificationExpiry:
                    type: string
                    format: date-time
                  authorities:
                    type: array
                    items:
                      type: string
                  isActive:
                    type: boolean
                  deactivatedAt:
                    type: string
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                required:
                  - id
                  - email
                  - name
                  - role
                  - disciplines
                  - createdAt
                  - updatedAt
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "500":
          description: Failed to fetch user
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/certification-status:
    get:
      tags:
        - Authentication
      summary: Get certification revocation status
      description: Returns whether the authenticated inspector must re-authenticate due to revoked certification or
        deactivated account (M-01)
      responses:
        "200":
          description: Certification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
                  revokedAt:
                    type: string
                    format: date-time
                  reasonCode:
                    type: string
                    enum:
                      - USER_DEACTIVATED
                      - CERTIFICATION_REVOKED
                required:
                  - revoked
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/sso/config:
    get:
      tags:
        - Authentication
      summary: Public SSO/OIDC config for inspector login
      responses:
        "200":
          description: SSO configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  clientId:
                    type: string
                  authorizationEndpoint:
                    type: string
                    format: uri
                  scopes:
                    type: array
                    items:
                      type: string
                  devProvider:
                    type: boolean
                required:
                  - enabled
  /auth/sso/authorize:
    get:
      tags:
        - Authentication
      summary: Start OIDC authorization (redirects to IdP or dev login)
      parameters:
        - schema:
            type: string
          required: false
          name: client_id
          in: query
        - schema:
            type: string
            format: uri
          required: true
          name: redirect_uri
          in: query
        - schema:
            type: string
            enum:
              - code
          required: true
          name: response_type
          in: query
        - schema:
            type: string
          required: false
          name: scope
          in: query
        - schema:
            type: string
            minLength: 1
          required: true
          name: state
          in: query
        - schema:
            type: string
          required: false
          name: nonce
          in: query
      responses:
        "302":
          description: Redirect to organization SSO
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /auth/sso/token:
    post:
      tags:
        - Authentication
      summary: Exchange OIDC authorization code for API tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 1
                redirectUri:
                  type: string
                  format: uri
                state:
                  type: string
                  minLength: 1
              required:
                - code
                - redirectUri
                - state
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: number
                required:
                  - accessToken
                  - refreshToken
                  - expiresIn
        "401":
          description: Invalid code or state
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
