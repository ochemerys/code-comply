                  reportId:
                    type: string
                  uniqueReportId:
                    type: string
                  type:
                    type: string
                  hash:
                    type: string
                  generatedAt:
                    type: string
                    format: date-time
                  message:
                    type: string
                required:
                  - valid
                  - reportId
                  - uniqueReportId
                  - type
                  - hash
                  - generatedAt
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
  /api/sync/push:
    post:
      tags:
        - Sync
      summary: Push batch mutations
      description: Push batch of mutations from client to server with deduplication support
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mutations:
                  type: array
                  items:
                    type: object
                    properties:
                      clientId:
                        type: string
                        format: uuid
                      entity:
                        type: string
                        enum:
                          - deficiency
                          - inspection
                          - checklist
                          - document
                      operation:
                        type: string
                        enum:
                          - create
                          - update
                          - delete
                      payload:
                        type: object
                        additionalProperties:
                          nullable: true
                      timestamp:
                        type: string
                        format: date-time
                    required:
                      - clientId
                      - entity
                      - operation
                      - payload
                      - timestamp
                  minItems: 1
                  maxItems: 100
              required:
                - mutations
      responses:
        "200":
          description: Mutations processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        clientId:
                          type: string
                          format: uuid
                        success:
                          type: boolean
                        serverId:
                          type: string
                        error:
                          type: string
                        conflict:
                          type: boolean
                          default: false
                      required:
                        - clientId
                        - success
                  timestamp:
                    type: string
                    format: date-time
                required:
                  - results
                  - timestamp
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
        "500":
          description: Failed to process sync push
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
  /api/sync/pull:
    get:
      tags:
        - Sync
      summary: Pull delta changes
      description: Pull changes from server since last sync timestamp
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Changes retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        entity:
                          type: string
                          enum:
                            - deficiency
                            - inspection
                            - checklist
                            - document
                        operation:
                          type: string
                          enum:
                            - create
                            - update
                            - delete
                        data:
                          type: object
                          additionalProperties:
                            nullable: true
                        timestamp:
                          type: string
                          format: date-time
                      required:
                        - id
                        - entity
                        - operation
                        - timestamp
                  timestamp:
                    type: string
                    format: date-time
                  hasMore:
                    type: boolean
                    default: false
                required:
                  - changes
                  - timestamp
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
        "500":
          description: Failed to process sync pull
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
